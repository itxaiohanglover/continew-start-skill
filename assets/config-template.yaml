# Project Initialization Configuration Template
# Supports: ContiNew Admin, RuoYi, and other Java admin frameworks

# Framework preset (optional) - use "continew" or "ruoyi" to auto-fill old values
# When set, you only need to provide "new" values for brand and package
framework: continew

# Brand Configuration
brand:
  # Original brand name (auto-filled when framework is set)
  old: continew
  # Your new brand name (lowercase, kebab-case)
  new: mycompany
  # PascalCase for class/file names (optional)
  # - 有预设时自动填充；无预设时可用 analyze_project 推断，或手动指定
  # - 如 JeecgBoot→Test4、RuoYi→MyCompany
  cap_old: ContiNew
  cap_new: Mycompany

# Package Configuration
package:
  # Original package path (auto-filled when framework is set)
  old: top.continew.admin
  # Your new package path (Java naming convention)
  new: com.mycompany.admin

# Project root directory (relative to this config file or absolute path)
project_root: .

# Directory Renaming Rules
# When using framework preset, these can be auto-generated
directories:
  rename:
    # === ContiNew Admin modules ===
    - from: continew-admin
      to: mycompany-admin
    - from: continew-server
      to: mycompany-server
    - from: continew-system
      to: mycompany-system
    - from: continew-common
      to: mycompany-common
    - from: continew-plugin
      to: mycompany-plugin
    - from: continew-extension
      to: mycompany-extension

    # === RuoYi modules (use when framework: ruoyi) ===
    # - from: ruoyi-admin
    #   to: mycompany-admin
    # - from: ruoyi-framework
    #   to: mycompany-framework
    # - from: ruoyi-system
    #   to: mycompany-system
    # - from: ruoyi-quartz
    #   to: mycompany-quartz
    # - from: ruoyi-generator
    #   to: mycompany-generator
    # - from: ruoyi-common
    #   to: mycompany-common

    # Plugin submodules (ContiNew - optional)
    # - from: continew-plugin/continew-plugin-open
    #   to: mycompany-plugin/mycompany-plugin-open
    # - from: continew-extension/continew-extension-schedule-server
    #   to: mycompany-extension/mycompany-extension-schedule-server

# Module Removal
modules:
  remove:
    # ContiNew: Remove schedule server if using company infrastructure
    # - continew-extension-schedule-server
    # ContiNew: Remove code generator if not needed
    # - continew-plugin-generator
    # RuoYi: Remove quartz if not using scheduled tasks
    # - ruoyi-quartz
    # RuoYi: Remove generator if not needed
    # - ruoyi-generator

# Replacements (optional) - 由 analyze_project 自动发现；显式内容替换，按 from 长度降序执行
# replacements:
#   - from: "me.zhengjie"
#     to: "com.mycompany"
#   - from: "eladmin"
#     to: "mycompany"
#   - from: "elAdmin"
#     to: "mycompany"

# File renames (optional) - 由 analyze_project 自动发现；文件名含品牌的文件将重命名
# file_renames:
#   - path: "sql/eladmin.sql"
#     new_name: "mycompany.sql"

# Build (optional) - 由 analyze_project 自动检测
# build:
#   system: maven
#   multi_module: true
#   verify_command: "mvn clean install"

# Preserve (optional) - skip replacement for these
preserve:
  patterns:
    # 包含以下字符串的行不参与替换（用于保护第三方包、域名等）
    - "top.continew.starter"
    - "continew-starter"
    # 常见第三方：org.jeecgframework（JeecgBoot 的 EasyExcel 等）、jeecg.com（域名）
  paths:
    # Files under these paths are skipped entirely
    - "**/ajax/libs/**"

# Content Replacement Rules (optional)
content:
  # 额外需替换内容的文件类型（除默认 .java/.xml/.yml/.yaml/.properties/.json/.javai/.txt 外）
  # 如框架特有的 .ftl、.vm、.jsp 等
  extra_file_patterns: []  # 例: ["**/*.ftl", "**/*.vm"]
  custom_patterns:
    # - from: "Old String"
    #   to: "New String"
    #   file_patterns: ["*.java", "*.xml"]

# Project Metadata
metadata:
  update_readme: true
  update_changelog: false
  update_license: true
  project:
    name: MyCompany Admin
    description: Custom admin platform
    version: 1.0.0
    author: Your Name
    author_email: your.email@example.com
    url: https://github.com/yourcompany/mycompany-admin

# Advanced Options
advanced:
  create_backup: true
  backup_location: "./backup"
  dry_run: false  # 或命令行 --dry-run：仅打印将执行的操作，不写文件
  verbose: true
  exclude_patterns:
    - "node_modules/**"
    - "target/**"
    - ".git/**"
    - "*.iml"
    - ".idea/**"
    - "*.class"
